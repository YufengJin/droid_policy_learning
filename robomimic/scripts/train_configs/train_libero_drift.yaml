# ============================================================================
# Hydra：LIBERO + Drift Policy（mean-shift drift loss，1-NFE 推理）
# ============================================================================
# 用法：
#   推荐：指定 Hydra 配置名（需设置环境变量，见 train_libero.py）
#     LIBERO_TRAIN_HYDRA_CONFIG=train_libero_drift torchrun --nproc_per_node=4 \
#       -m robomimic.scripts.train_libero
#   或仍用默认 train_libero.yaml，仅覆盖算法：
#     python -m robomimic.scripts.train_libero algo_name=drift_policy
#
# 架构与超参说明见：docs/drift_libero_training_report.md
# ============================================================================

load_from: null
debug: false

# ----------------------------------------------------------------------------
# 算法配置
# ----------------------------------------------------------------------------
algo_name: drift_policy

# ----------------------------------------------------------------------------
# 实验配置 (experiment)
# ----------------------------------------------------------------------------
experiment:
  name: null

  validate: true

  logging:
    terminal_output_to_txt: true
    log_tb: true
    log_wandb: true
    wandb_proj_name: drift_policy_libero

  mse:
    enabled: true
    every_n_epochs: 10
    on_save_ckpt: true
    num_samples: 6
    visualize: true

  save:
    enabled: true
    every_n_seconds: null
    every_n_epochs: 50
    epochs: []
    on_best_validation: true
    on_best_rollout_return: false
    on_best_rollout_success_rate: true

  epoch_every_n_steps: 100
  validation_epoch_every_n_steps: 10

  env: null
  additional_envs: null
  ckpt_path: null
  resume: false
  env_meta_update_dict: {}

  render: false
  render_video: true
  keep_all_videos: false
  video_skip: 5

  rollout:
    enabled: false
    n: 50
    horizon: 400
    rate: 50
    warmstart: 0
    terminate_on_success: true

# ----------------------------------------------------------------------------
# 训练配置 (train)
# ----------------------------------------------------------------------------
train:
  data:
    - path: /workspace/datasets/libero/
      weight: 1.0

  data_format: robomimic

  output_dir: /workspace/droid_policy_learning/outputs

  hdf5_filter_key: train
  hdf5_validation_filter_key: valid
  hdf5_cache_mode: low_dim
  hdf5_use_swmr: true
  hdf5_normalize_obs: false
  hdf5_load_next_obs: true
  num_data_workers: 4

  seq_length: 15
  pad_seq_length: true
  frame_stack: 2
  pad_frame_stack: true

  dataset_keys:
    - actions
  goal_mode: null
  truncated_geom_factor: 0.3

  cuda: true
  batch_size: 64
  num_epochs: 100000
  seed: 1

  # action_space 控制旋转表示：pos_euler (7D, 默认) | pos_rot6d (10D) | pos_axisangle (7D)
  action_space: pos_euler

  action_keys:
    - actions

  action_shapes:
    - [1, 7]

  action_config:
    actions: {normalization: min_max}

  shuffled_obs_key_groups: []

# ----------------------------------------------------------------------------
# 算法特定配置 — 与 Diffusion 共用 UNet/调度器；DriftPolicyConfig 会强制
# noise_samples=1、ddim/ddpm num_inference_timesteps=1
# ----------------------------------------------------------------------------
algo:
  optim_params:
    policy:
      learning_rate:
        initial: 0.0001
        decay_factor: 0.1
        epoch_schedule: []
      regularization: {L2: 0.0}

  horizon:
    observation_horizon: 2
    action_horizon: 8
    prediction_horizon: 16

  unet:
    enabled: true
    diffusion_step_embed_dim: 256
    down_dims: [256, 512, 1024]
    kernel_size: 5
    n_groups: 8

  ema:
    enabled: true
    power: 0.75

  ddpm:
    enabled: false
    num_train_timesteps: 100
    num_inference_timesteps: 100
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    prediction_type: epsilon

  ddim:
    enabled: true
    num_train_timesteps: 100
    num_inference_timesteps: 10
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    set_alpha_to_one: true
    steps_offset: 0
    prediction_type: epsilon

  # DriftPolicyConfig 会覆盖为 1；此处写明便于阅读
  noise_samples: 1

  drift:
    temp: 0.05
    max_drift: 0.1
    use_adaptive_temp: true
    # P0: kernel type and distance scaling
    kernel_type: laplace            # laplace / rbf / multiscale_rbf
    dist_scale_mode: none           # none / sqrt_dim (recommended for high-dim actions)
    rbf_sigma: 1.0                  # σ for RBF kernel (only used when kernel_type=rbf)
    multiscale_sigmas: [0.25, 0.5, 1.0, 2.0]  # σ list for multiscale_rbf kernel
    # P0: adaptive temperature tuning
    adaptive_median_scale: 0.3      # multiplier for median distance
    adaptive_min_temp: 0.01         # absolute minimum temperature
    # P0: kernel observability
    log_kernel_stats: true          # log kernel_max, kernel_mean, dist_median, drift_alignment
    log_kernel_every_n_steps: 100   # logging frequency
    assert_alive_kernel: false      # warn if kernel_max < threshold
    alive_kernel_threshold: 1.0e-6
    # Two-phase training: warmup with diffusion loss before drift
    warmup_epochs: 200              # 0 = disabled; >0 = use diffusion loss for first N epochs
    # Curriculum max-drift: anneal max_drift over training
    max_drift_start: 0.3            # initial max_drift (large for early exploration)
    max_drift_end: 0.05             # final max_drift (small for precision)
    max_drift_anneal_epochs: 2000   # linear anneal over this many epochs; 0 = disabled
    # Scheduled EMA decay
    ema_decay_start: null            # null = disabled; e.g. 0.75 → fast early tracking
    ema_decay_end: null              # e.g. 0.99 → stable late teacher
    ema_decay_anneal_epochs: 0       # linear anneal over this many epochs

# ----------------------------------------------------------------------------
# 观察配置 (observation)
# ----------------------------------------------------------------------------
observation:
  image_dim: [128, 128]

  modalities:
    obs:
      low_dim:
        - robot_states
      rgb:
        - agentview_image
        - eye_in_hand_image
      depth: []
      scan: []
    goal:
      low_dim: []
      rgb: []
      depth: []
      scan: []

  encoder:
    low_dim:
      core_class: null
      core_kwargs: {}
      obs_randomizer_class: null
      obs_randomizer_kwargs: {}

    rgb:
      core_class: VisualCore
      fuser: null
      core_kwargs:
        feature_dimension: 512
        flatten: true
        backbone_class: ResNet50Conv
        backbone_kwargs:
          pretrained: true
          use_cam: false
          downsample: false
        pool_class: null
        pool_kwargs: null
      obs_randomizer_class:
        - ColorRandomizer
        - CropRandomizer
      obs_randomizer_kwargs:
        - {}
        - {crop_height: 116, crop_width: 116, num_crops: 1, pos_enc: false}

    depth:
      core_class: VisualCore
      core_kwargs: {}
      obs_randomizer_class: null
      obs_randomizer_kwargs: {}

    scan:
      core_class: ScanCore
      core_kwargs: {}
      obs_randomizer_class: null
      obs_randomizer_kwargs: {}
